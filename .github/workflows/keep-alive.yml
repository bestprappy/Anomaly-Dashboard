name: Keep API Awake

on:
  schedule:
    # Every 10 minutes — Render free tier sleeps after 15 min idle.
    - cron: "*/10 * * * *"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Render API
        run: |
          curl -sS -o /dev/null -w "HTTP %{http_code} in %{time_total}s\n" \
            --retry 3 --retry-all-errors --max-time 90 \
            https://todo-api-obyu.onrender.com/
