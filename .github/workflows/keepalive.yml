name: Keep Hugging Face Backend Awake

on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: hf-backend-keepalive
  cancel-in-progress: true

jobs:
  keepalive:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Ping health endpoint
        run: |
          curl --retry 3 \
               --retry-delay 5 \
               --retry-all-errors \
               --fail \
               --silent \
               --show-error \
               https://atonality123-test101.hf.space/api/health
